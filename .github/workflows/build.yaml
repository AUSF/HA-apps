name: Build e pubblica IO2MQTT

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: addon-io2mqtt
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - ha_arch: aarch64
            platform: linux/arm64
          - ha_arch: armv7
            platform: linux/arm/v7
          - ha_arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Imposta QEMU (emulazione multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Imposta Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login su GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nome repository in minuscolo
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Estrae la versione dal tag git
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build e push (${{ matrix.ha_arch }})
        uses: docker/build-push-action@v6
        with:
          context: ./io2mqtt
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/${{ matrix.ha_arch }}-${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/${{ matrix.ha_arch }}-${{ env.IMAGE_NAME }}:latest