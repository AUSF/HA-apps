name: Build e pubblica IO2MQTT

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versione da buildare (es. 0.2.2, senza il prefisso v)"
        required: true
        type: string

env:
  IMAGE_NAME: addon-io2mqtt
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: aarch64
            platform: linux/arm64
          - ha_arch: armv7
            platform: linux/arm/v7
          - ha_arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Imposta QEMU (emulazione multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Imposta Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login su GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nome repository in minuscolo
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Determina la versione da buildare
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build e push (${{ matrix.ha_arch }})
        uses: docker/build-push-action@v6
        with:
          context: ./io2mqtt
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/${{ matrix.ha_arch }}-${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/${{ matrix.ha_arch }}-${{ env.IMAGE_NAME }}:latest
